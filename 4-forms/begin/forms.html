<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Alien Abduction Order Form</title>
	<link href="css/forms.css" rel="stylesheet">
</head>
<body>
	<link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&display=swap" rel="stylesheet">

	<div class="wrapper">
		<section>
			<h1>Alien Abduction Order Form</h1>
			Fill out the form below to place an order for an alien abduction by one of our fine UFOs.</p>
			<form>
				<fieldset>
			<legend>Your contact information</legend>
			<label for="name">Your name</label> <input type="text" id="name" name="myname">
			<label for="phone number">Phone number </label> <input type="tel" id="phone number" name="phone number" placeholder="+359">
			<label for="email">Email</label><input type="email" id="email" name="email">
				</fieldset>
			</form>

			<form>
				<fieldset>
				<legend>About your abduction </legend>
			<label for="date">Requested  date</label><input type="date" name="date" id="date">
		
	<label for="number">How many people would you like abducted?<label><input type="number" name="number" id="number" min="1" max="10 ">
			<p>What type of UFO do you prefer?</p>
				<ul>
					<li><label for="li1">Classic oval UFO</label><input type="radio" name="li1" value="classic" id="li1" checked></li>
					<li><label for="li2">Star Wars-style Imperial cruiser</label><input type="radio" name="li1" id="li2"></li>
					<li><label for="li3">Battlestar Galactica-style Viper</label><input type="radio" name="li1" id="li3"></li>
					<li><label for="li4">Borg-style cube<</label><input type="radio" name="li1" id="li4"></li>
				</ul> 
			<label>What type of abduction experience do you want?
				<select name="abduction" id="abduction">
					<option selected value"selected"> selected... </option>
					<option Value="tour"> Tour of the solar system</option>
					<option value="disscuison"> Alien dinner and discussion</option>
					<option value="lessons"> Alien dance lessons</option>
					<option value="watching" > Whale watching</option>
				</select>
				<label>
			<label for="comments">Special requests:</label>
			<textarea name="comments" id="comments">
			</textarea>
			<label>
				<input type="checkbox" value="subscribe" name="subscribe" checked>Add me to your email list</checkbox>
			</label>
			<fieldset>
				<button type="submit">Submit</button>	
			</form>			
		</section>
		<aside>
			<h3>Our Location</h3>
			<iframe src="https://www.google.com/maps/embed?pb=!1m28!1m12!1m3!1d5320.062408445253!2d16.361712777576056!3d48.18675026690941!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!4m13!3e6!4m5!1s0x476da9d4df200fd3%3A0xd704e5e2b2f68bf5!2sJohann-Strau%C3%9F-Gasse%2C%201040%20Wien!3m2!1d48.187697899999996!2d16.3681375!4m5!1s0x476da82d2fc04f0d%3A0x3d4c9a78d1af2a49!2sGassergasse%2029%2C%201050%20Wien!3m2!1d48.1829896!2d16.3627926!5e0!3m2!1sbg!2sat!4v1615308555867!5m2!1sbg!2sat" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
			<address>
				Frontend Masters &middot;
				60 South 6th Street &middot;
				Suite 3625 &middot;
				Minneapolis, MN 55402
			</address>
			
		</aside>
	</div>
	<script src="js/forms.js"></script>
</body>
</html>
